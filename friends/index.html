<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled Code Display</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
        }

        /* body 样式 */
        body {
            padding: 20px !important;
        }

        /* 针对 pre 元素的样式 */
        body pre {
            background-color: #fffdf8 !important;
            border: 1px solid #eaeaea !important;
            border-left: 8px solid #f1e5e8 !important;
            border-radius: 8px !important;
            padding: 0 4px !important;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1) !important;
            transition: all 0.3s ease !important;
            margin: 10px 0 !important;
            display: flex !important;
            align-items: center !important;
            width: 100% !important;
            box-sizing: border-box !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            height: 2.5em !important;
        }

        /* pre 元素悬停样式 */
        body pre:hover {
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15) !important;
            transform: translateY(-2px) scale(1.02) !important;
            background-color: #fff6e0 !important;
            border-color: #d8afb7 !important;
            border-left-color: #f1e5e8 !important;
        }

        /* pre 元素内 p 标签的样式 */
        body pre p {
            font-family: 'Source Han Serif', 'Courier New', Courier, monospace !important;
            font-size: 0.9em !important;
        }
    </style>
</head>

<body>
    <pre>
        <p>
            这是第一个示例代码文本。
        </p>
    </pre>
    <pre>
        <p>
            这是第二个示例代码文本。
        </p>
    </pre>
    <pre>
        <p>
            这是第三个示例代码文本。
        </p>
    </pre>
    <pre>
        <p>
            这是第四个示例代码文本。
        </p>
    </pre>
    <pre>
        <p>
            &lt;a href="#" class="link"&gt;这是第五个示例代码文本。&lt;/a&gt;
        </p>
    </pre>
    <script>
        window.onload = function () {
            try {
                const preElements = Array.from(document.getElementsByTagName('pre'));
                const parent = preElements[0].parentNode;

                if (!parent) {
                    console.error('未找到 pre 元素的父元素');
                    return;
                }

                // Fisher-Yates 洗牌算法
                for (let i = preElements.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [preElements[i], preElements[j]] = [preElements[j], preElements[i]];
                }

                // 清空父元素中的 pre 元素
                while (parent.firstChild) {
                    parent.removeChild(parent.firstChild);
                }

                // 将打乱顺序后的 pre 元素重新添加到父元素中
                preElements.forEach(pre => {
                    parent.appendChild(pre);
                });

                console.log('代码块已成功随机排列');
            } catch (error) {
                console.error('随机排列代码块时出现错误:', error);
            }
        };
    </script>
</body>

</html>
